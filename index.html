<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <link rel="stylesheet" href="style.css">
    <title>DopyCat</title>
</head>

<body>

    <div class="window card-window">
        <div class="title-bar">
            <div class="title-bar-text title-bar-text-custom">www.dopycat.com</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>

        <div class="window-body">

            <!-- esquerda -->
            <div class="lado-esquerdo">
                <img src="img/pfp.jpg" class="profile-img">
                <div class="sunken-panel panel-left">
                    <p class="sidebar-note">
                        <strong>scroll to read →</strong><br>
                        welcome to my crd!<br>
                        <a href="#" style="text-decoration:none; color:pink;">q&a twt insta</a>
                    </p>
                </div>
                <button class="default btn-icon"><img src="./img/github.png" alt="GitHub" class="platform-icon"> GitHub</button>
                <button class="default btn-icon"><img src="./img/instagram.png" alt="Instagram" class="platform-icon"> Instagram</button>
                <button class="default btn-icon"><img src="./img/discord.png" alt="Discord" class="platform-icon"> Discord</button>
                <button class="default btn-icon"><img src="./img/tiktok.png" alt="Tiktok" class="platform-icon"> Tiktok</button>
            </div>

            <!-- direita -->
            <div class="lado-direito">

                <div class="table-view__row row-head">
                    <strong>@DopyCat</strong>
                </div>

                <div class="table-view__row row-subtitle">
                    last updated on 07/27/2023
                </div>

                <div class="sunken-panel panel-right">

                    <div class="table-view__row">
                        hi my name is <span style="color:pink;">Dopy Cat</span>
                    </div>

                    <div class="table-view__row">
                        <span style="color:pink;">before you follow</span> info info info
                    </div>

                    <div class="table-view__row">
                        info info info info info
                    </div>

                    <div class="table-view__row">
                        info info info info info
                    </div>

                    <div class="table-view__row">
                        info info info info info
                    </div>

                </div>

            </div>

        </div>

</body>

</html>
